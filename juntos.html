<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>Juntos — Grow in Sync</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&family=Dancing+Script:wght@700&display=swap" rel="stylesheet">
<script crossorigin src="https://unpkg.com/react@18/umd/react.development.js"></script>
<script crossorigin src="https://unpkg.com/react-dom@18/umd/react-dom.development.js"></script>
<script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
:root{
  --navy:#1B3A6B;--navy-h:#243F73;--navy-l:rgba(27,58,107,0.08);
  --orange:#E07B2A;--orange-l:#F5A855;--orange-bg:rgba(224,123,42,0.1);
  --bg:#F5F4F1;--card:#FFFFFF;
  --text:#1A1A2E;--muted:#6B7280;--light:#9CA3AF;
  --border:#E5E7EB;
  --green:#22C55E;--green-bg:rgba(34,197,94,0.1);
  --red:#EF4444;
  --sw:240px;--r:12px;--rs:8px;
  --sh:0 1px 3px rgba(0,0,0,.06),0 1px 2px rgba(0,0,0,.04);
  --shm:0 4px 12px rgba(0,0,0,.08);
}
body{font-family:'Inter',system-ui,sans-serif;background:var(--bg);color:var(--text);font-size:14px;line-height:1.5;-webkit-font-smoothing:antialiased}

/* Layout */
.layout{display:flex;min-height:100vh}
.main{flex:1;margin-left:var(--sw);min-height:100vh;overflow-y:auto}

/* Sidebar */
.sb{position:fixed;top:0;left:0;width:var(--sw);height:100vh;background:var(--navy);display:flex;flex-direction:column;z-index:100}
.sb-logo{padding:28px 24px 20px;border-bottom:1px solid rgba(255,255,255,.08)}
.logo-mk{display:flex;align-items:center;gap:10px}
.logo-ic{width:42px;height:42px;border-radius:50%;overflow:hidden;flex-shrink:0;background:#EDE8E1;display:flex;align-items:center;justify-content:center}
.logo-ic img{width:100%;height:100%;object-fit:contain}
.logo-tx{font-family:'Dancing Script',cursive;font-size:22px;color:#fff;line-height:1}
.logo-sub{font-size:10px;color:rgba(255,255,255,.45);letter-spacing:.08em;text-transform:uppercase;margin-top:2px;white-space:nowrap}
.sb-nav{flex:1;padding:16px 12px;display:flex;flex-direction:column;gap:2px}
.nav-it{display:flex;align-items:center;gap:10px;padding:10px 12px;border-radius:var(--rs);color:rgba(255,255,255,.6);font-size:14px;font-weight:500;cursor:pointer;transition:all .15s;border:none;background:none;width:100%;text-align:left;font-family:inherit}
.nav-it:hover{background:rgba(255,255,255,.08);color:rgba(255,255,255,.9)}
.nav-it.active{background:rgba(224,123,42,.18);color:#fff}
.nav-ic{font-size:17px;width:20px;text-align:center;flex-shrink:0}
.nav-badge{margin-left:auto;background:var(--orange);color:#fff;font-size:11px;font-weight:600;padding:2px 7px;border-radius:20px}
.sb-ft{padding:16px 12px;border-top:1px solid rgba(255,255,255,.08)}
.uc{display:flex;align-items:center;gap:10px;padding:10px 12px;border-radius:var(--rs);cursor:pointer;transition:background .15s}
.uc:hover{background:rgba(255,255,255,.08)}
.ua{width:34px;height:34px;border-radius:50%;background:var(--orange-bg);display:flex;align-items:center;justify-content:center;font-size:18px;flex-shrink:0;border:2px solid rgba(255,255,255,.15)}
.ui{flex:1;min-width:0}
.un{font-size:13px;font-weight:600;color:#fff;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.us{font-size:11px;color:var(--orange-l)}
.logout{background:none;border:none;color:rgba(255,255,255,.4);cursor:pointer;padding:4px;border-radius:6px;font-size:16px;transition:color .15s}
.logout:hover{color:rgba(255,255,255,.8)}

/* Page */
.page{padding:36px 40px;max-width:1100px}
.ph{margin-bottom:28px}
.pt{font-size:22px;font-weight:700}
.ps{font-size:14px;color:var(--muted);margin-top:4px}
.ph-row{display:flex;align-items:flex-start;justify-content:space-between;margin-bottom:28px}

/* Card */
.card{background:var(--card);border-radius:var(--r);border:1px solid var(--border);box-shadow:var(--sh)}
.cb{padding:20px}

/* Btn */
.btn{display:inline-flex;align-items:center;gap:6px;padding:8px 16px;border-radius:var(--rs);font-size:13px;font-weight:600;cursor:pointer;transition:all .15s;border:1.5px solid transparent;white-space:nowrap;font-family:inherit}
.btn-p{background:var(--navy);color:#fff;border-color:var(--navy)}.btn-p:hover{background:var(--navy-h)}
.btn-o{background:var(--orange);color:#fff;border-color:var(--orange)}.btn-o:hover{background:#c96d20}
.btn-out{background:transparent;border-color:var(--border);color:var(--text)}.btn-out:hover{border-color:var(--navy);color:var(--navy);background:var(--navy-l)}
.btn-g{background:transparent;color:var(--muted);border:none;padding:6px 10px}.btn-g:hover{background:var(--navy-l);color:var(--navy)}
.btn-sm{padding:5px 12px;font-size:12px}.btn-lg{padding:11px 24px;font-size:15px}
.btn-full{width:100%;justify-content:center}
.btn:disabled{opacity:.5;cursor:not-allowed}

/* Form */
.fg{margin-bottom:16px}
.fl{display:block;font-size:13px;font-weight:600;margin-bottom:6px}
.fi{width:100%;padding:10px 14px;border:1.5px solid var(--border);border-radius:var(--rs);font-size:14px;font-family:inherit;color:var(--text);background:var(--card);outline:none;transition:border-color .15s}
.fi:focus{border-color:var(--navy)}
.fi::placeholder{color:var(--light)}
textarea.fi{resize:vertical;min-height:80px}

/* Grid */
.g2{display:grid;grid-template-columns:1fr 1fr;gap:16px}
.g3{display:grid;grid-template-columns:repeat(3,1fr);gap:16px}
.g4{display:grid;grid-template-columns:repeat(4,1fr);gap:16px}

/* Stats */
.stat{display:flex;flex-direction:column;align-items:center;gap:4px;padding:16px;border-radius:var(--r);background:var(--card);border:1px solid var(--border)}
.sv{font-size:28px;font-weight:700;line-height:1}
.sl{font-size:12px;color:var(--muted);font-weight:500}

/* Badge */
.bdg{display:inline-flex;align-items:center;gap:4px;padding:3px 10px;border-radius:20px;font-size:12px;font-weight:600}
.bdg-o{background:var(--orange-bg);color:var(--orange)}
.bdg-n{background:var(--navy-l);color:var(--navy)}
.bdg-g{background:var(--green-bg);color:var(--green)}
.bdg-gr{background:#F3F4F6;color:var(--muted)}

/* Avatar */
.av{border-radius:50%;background:var(--navy-l);display:inline-flex;align-items:center;justify-content:center;flex-shrink:0}
.av-md{width:32px;height:32px;font-size:16px}
.av-lg{width:48px;height:48px;font-size:24px}
.av-sm{width:26px;height:26px;font-size:13px}
.av-xl{width:64px;height:64px;font-size:32px}

/* Progress */
.pb{height:6px;background:var(--border);border-radius:3px;overflow:hidden}
.pf{height:100%;border-radius:3px;transition:width .4s ease}
.pf-o{background:var(--orange)}
.pf-n{background:var(--navy)}
.pf-g{background:var(--green)}

/* Auth */
.auth-page{min-height:100vh;display:grid;grid-template-columns:1fr 1fr}
.auth-brand{background:var(--navy);display:flex;flex-direction:column;align-items:center;justify-content:center;padding:60px;gap:32px}
.auth-logo{display:flex;flex-direction:column;align-items:center}
.auth-logo-ic{width:260px;height:260px;border-radius:50%;overflow:hidden;box-shadow:0 12px 48px rgba(0,0,0,.25);background:#EDE8E1}
.auth-logo-ic img{width:100%;height:100%;object-fit:contain}
.auth-logo-nm{display:none}
.auth-logo-tg{display:none}
.auth-feat{display:flex;flex-direction:column;gap:16px}
.af{display:flex;align-items:flex-start;gap:12px}
.af-ic{width:36px;height:36px;background:rgba(255,255,255,.1);border-radius:10px;display:flex;align-items:center;justify-content:center;flex-shrink:0;font-size:17px}
.af-t{font-size:14px;font-weight:600;color:#fff}
.af-d{font-size:12px;color:rgba(255,255,255,.55);margin-top:2px}
.auth-side{display:flex;align-items:center;justify-content:center;padding:60px;background:var(--bg)}
.auth-box{width:100%;max-width:380px}
.auth-tabs{display:flex;border-bottom:2px solid var(--border);margin-bottom:28px}
.auth-tab{flex:1;padding:10px;text-align:center;font-size:14px;font-weight:600;color:var(--muted);cursor:pointer;border:none;background:none;font-family:inherit;border-bottom:2px solid transparent;margin-bottom:-2px;transition:all .15s}
.auth-tab.active{color:var(--navy);border-bottom-color:var(--navy)}
.auth-title{font-size:24px;font-weight:700;margin-bottom:6px}
.auth-sub{font-size:14px;color:var(--muted);margin-bottom:28px}
.av-pick{display:flex;gap:10px;flex-wrap:wrap;margin-bottom:6px}
.av-opt{width:44px;height:44px;border-radius:50%;font-size:22px;display:flex;align-items:center;justify-content:center;cursor:pointer;border:2px solid var(--border);background:#fff;transition:all .15s}
.av-opt.sel{border-color:var(--navy);background:var(--navy-l);transform:scale(1.1)}

/* Welcome */
.welcome{background:linear-gradient(135deg,var(--navy) 0%,#2C4F8C 100%);border-radius:var(--r);padding:28px 32px;margin-bottom:24px;position:relative;overflow:hidden}
.wg{font-size:13px;color:rgba(255,255,255,.6);margin-bottom:4px}
.wn{font-size:26px;font-weight:700;color:#fff;margin-bottom:12px}
.ws{display:inline-flex;align-items:center;gap:8px;background:rgba(255,255,255,.1);border-radius:20px;padding:6px 14px;font-size:13px;color:#fff}
.ws strong{color:var(--orange-l)}

.sec-t{font-size:15px;font-weight:700;margin-bottom:14px;display:flex;align-items:center;justify-content:space-between}
.link-btn{background:none;border:none;color:var(--navy);font-weight:500;cursor:pointer;font-family:inherit;font-size:13px}

/* Group card */
.gc{background:var(--card);border:1px solid var(--border);border-radius:var(--r);padding:18px;cursor:pointer;transition:all .15s;box-shadow:var(--sh)}
.gc:hover{border-color:var(--navy);box-shadow:var(--shm);transform:translateY(-1px)}
.gc-h{display:flex;align-items:flex-start;gap:12px;margin-bottom:12px}
.gt-ic{width:40px;height:40px;border-radius:10px;background:var(--navy-l);display:flex;align-items:center;justify-content:center;font-size:20px;flex-shrink:0}
.gn{font-size:15px;font-weight:700}
.gtp{font-size:12px;color:var(--muted);margin-top:2px}
.gc-st{display:flex;align-items:center;gap:14px;margin-top:12px;padding-top:12px;border-top:1px solid var(--border)}
.gst{font-size:12px;color:var(--muted)}
.gst strong{font-weight:600;color:var(--text)}

/* Topic card */
.tc{background:var(--card);border:1px solid var(--border);border-radius:var(--r);padding:18px;transition:all .15s;box-shadow:var(--sh);display:flex;flex-direction:column;gap:12px}
.tc:hover{border-color:rgba(27,58,107,.3);box-shadow:var(--shm)}
.tc.joined{border-color:var(--navy);background:linear-gradient(135deg,#fff 80%,var(--navy-l) 100%)}
.t-ic{width:48px;height:48px;border-radius:12px;background:var(--bg);display:flex;align-items:center;justify-content:center;font-size:24px}
.tn{font-size:15px;font-weight:700}
.td{font-size:13px;color:var(--muted);line-height:1.4}
.tm{display:flex;align-items:center;justify-content:space-between}

/* Categories */
.cats{display:flex;gap:8px;flex-wrap:wrap;margin-bottom:20px}
.cat{padding:6px 14px;border-radius:20px;font-size:13px;font-weight:500;cursor:pointer;border:1.5px solid var(--border);background:var(--card);color:var(--muted);transition:all .15s;font-family:inherit}
.cat:hover{border-color:var(--navy);color:var(--navy)}
.cat.active{background:var(--navy);border-color:var(--navy);color:#fff}

/* Group detail */
.gd-h{background:var(--card);border:1px solid var(--border);border-radius:var(--r);padding:24px;margin-bottom:20px;display:flex;align-items:flex-start;gap:16px;box-shadow:var(--sh)}
.gd-ic{width:56px;height:56px;border-radius:14px;background:var(--navy-l);display:flex;align-items:center;justify-content:center;font-size:28px;flex-shrink:0}
.gdn{font-size:22px;font-weight:700;margin-bottom:4px}
.gdm{font-size:13px;color:var(--muted);display:flex;align-items:center;gap:12px;flex-wrap:wrap}

/* Messages */
.msgs{display:flex;flex-direction:column;gap:12px;max-height:380px;overflow-y:auto;padding:4px 0}
.msgs::-webkit-scrollbar{width:4px}
.msgs::-webkit-scrollbar-thumb{background:var(--border);border-radius:2px}
.mi{display:flex;gap:10px}
.mb{flex:1;background:var(--bg);border-radius:0 10px 10px 10px;padding:10px 12px}
.mb.ci{background:var(--green-bg)}
.mh{display:flex;align-items:center;gap:8px;margin-bottom:4px}
.ma{font-size:13px;font-weight:600}
.mt{font-size:11px;color:var(--light)}
.mx{font-size:13px;line-height:1.5}
.kbtn{display:inline-flex;align-items:center;gap:4px;margin-top:6px;padding:3px 8px;border-radius:6px;font-size:12px;font-weight:500;cursor:pointer;border:1px solid var(--border);background:#fff;color:var(--muted);transition:all .15s;font-family:inherit}
.kbtn:hover{border-color:var(--orange);color:var(--orange)}
.kbtn.active{background:var(--orange-bg);border-color:var(--orange);color:var(--orange)}
.msg-in{display:flex;gap:8px;margin-top:14px}
.msg-in .fi{flex:1}

/* Member item */
.mem-it{display:flex;align-items:center;gap:12px;padding:12px;border-radius:var(--rs);background:var(--bg)}
.mem-n{font-size:14px;font-weight:600}
.mem-r{font-size:12px;color:var(--muted)}

/* Profile */
.prof-h{background:linear-gradient(135deg,var(--navy) 0%,#2C4F8C 100%);border-radius:var(--r);padding:32px;display:flex;align-items:flex-start;gap:20px;margin-bottom:24px}
.prof-av{width:72px;height:72px;border-radius:50%;background:rgba(255,255,255,.15);display:flex;align-items:center;justify-content:center;font-size:36px;border:3px solid rgba(255,255,255,.3);flex-shrink:0}
.prof-nm{font-size:24px;font-weight:700;color:#fff;margin-bottom:4px}
.prof-jn{font-size:13px;color:rgba(255,255,255,.5);margin-bottom:14px}
.prof-sts{display:flex;gap:24px}
.pst{text-align:center}
.psv{font-size:22px;font-weight:700;color:#fff}
.psl{font-size:11px;color:rgba(255,255,255,.5);text-transform:uppercase;letter-spacing:.05em}

.ach-bdg{display:flex;flex-direction:column;align-items:center;gap:6px;padding:16px 12px;border-radius:var(--r);border:1.5px solid var(--border);background:var(--card);min-width:90px;text-align:center}
.ach-bdg.earned{border-color:var(--orange);background:var(--orange-bg)}
.ach-ic{font-size:28px}
.ach-nm{font-size:12px;font-weight:600}
.ach-bdg.locked .ach-ic{filter:grayscale(1) opacity(.4)}
.ach-bdg.locked .ach-nm{color:var(--light)}

/* Feed */
.fi-item{display:flex;gap:10px;padding:12px 0;border-bottom:1px solid var(--border)}
.fi-item:last-child{border-bottom:none}
.fi-tx{font-size:13px;line-height:1.5}
.fi-tm{font-size:11px;color:var(--light);margin-top:2px}

/* Modal */
.ov{position:fixed;inset:0;background:rgba(0,0,0,.45);display:flex;align-items:center;justify-content:center;z-index:200;padding:20px;backdrop-filter:blur(2px)}
.modal{background:var(--card);border-radius:16px;box-shadow:0 20px 60px rgba(0,0,0,.2);width:100%;max-width:480px;max-height:90vh;overflow-y:auto}
.mh-row{padding:20px 24px 0;display:flex;align-items:center;justify-content:space-between}
.mh-t{font-size:18px;font-weight:700}
.mc{background:none;border:none;cursor:pointer;color:var(--muted);font-size:20px;padding:4px;border-radius:6px;line-height:1}
.mc:hover{color:var(--text)}
.mb-p{padding:20px 24px 24px}

/* Search */
.sb-w{position:relative;margin-bottom:20px}
.sb-w .fi{padding-left:38px}
.sb-ic{position:absolute;left:12px;top:50%;transform:translateY(-50%);color:var(--light);font-size:15px}

/* Notification */
.notif{position:fixed;bottom:24px;right:24px;z-index:300;padding:12px 20px;border-radius:10px;font-size:14px;font-weight:600;box-shadow:0 4px 16px rgba(0,0,0,.15);animation:slideUp .25s ease;color:#fff}
@keyframes slideUp{from{transform:translateY(20px);opacity:0}to{transform:translateY(0);opacity:1}}

/* Reactions */
.rxns{display:flex;flex-wrap:wrap;gap:4px;margin-top:8px}
.rxn{display:inline-flex;align-items:center;gap:3px;padding:3px 8px;border-radius:20px;font-size:12px;cursor:pointer;border:1px solid var(--border);background:#fff;transition:all .15s;font-family:inherit;color:var(--muted)}
.rxn:hover{border-color:var(--navy);background:var(--navy-l);color:var(--navy)}
.rxn.on{background:var(--orange-bg);border-color:var(--orange);color:var(--orange)}
.rxn-c{font-weight:700;font-size:11px}

/* Celebration & challenge messages */
.mb.celeb{background:linear-gradient(135deg,rgba(255,215,0,.12),rgba(224,123,42,.1));border:1px solid rgba(224,123,42,.3)}
.mb.celeb .mx{color:var(--navy);font-weight:600;font-size:14px}
.mb.chal{background:linear-gradient(135deg,var(--navy-l),rgba(27,58,107,.12));border:1px solid rgba(27,58,107,.2)}
.mb.chal .mx{color:var(--navy);font-weight:500}

/* Group streak badge */
.gs-bdg{display:inline-flex;align-items:center;gap:6px;background:rgba(224,123,42,.15);padding:5px 14px;border-radius:20px;font-size:13px;color:var(--orange);font-weight:700;margin-top:8px}

/* Pomodoro */
.pom-wrap{text-align:center;padding:20px;background:var(--navy-l);border-radius:var(--rs);margin-bottom:16px}
.pom-time{font-size:52px;font-weight:700;color:var(--navy);letter-spacing:.04em;line-height:1;font-variant-numeric:tabular-nums}
.pom-done{font-size:22px;font-weight:700;color:var(--green);margin-bottom:8px}

/* Leaderboard */
.lb-row{display:flex;align-items:center;gap:12px;padding:12px;border-radius:var(--rs);transition:background .15s}
.lb-row:hover{background:var(--bg)}
.lb-pos{font-size:20px;width:32px;text-align:center;flex-shrink:0}

/* Group detail tabs */
.gd-tabs{display:flex;border-bottom:2px solid var(--border);margin-bottom:16px}
.gd-tab{padding:8px 16px;font-size:13px;font-weight:600;color:var(--muted);cursor:pointer;border:none;background:none;font-family:inherit;border-bottom:2px solid transparent;margin-bottom:-2px;transition:all .15s}
.gd-tab.active{color:var(--navy);border-bottom-color:var(--navy)}

/* Challenge inline form */
.ch-form{padding:10px 12px;background:var(--orange-bg);border-radius:0 0 var(--rs) var(--rs);display:flex;gap:8px;margin-top:2px}

/* Empty */
.empty{text-align:center;padding:48px 24px;color:var(--muted)}
.empty-ic{font-size:40px;margin-bottom:12px}
.empty-t{font-size:16px;font-weight:600;color:var(--text);margin-bottom:6px}

/* Utils */
.flex{display:flex}.fc{flex-direction:column}.ia{align-items:center}.jb{justify-content:space-between}
.gap8{gap:8px}.gap12{gap:12px}.gap16{gap:16px}
.mt8{margin-top:8px}.mt16{margin-top:16px}.mt24{margin-top:24px}
.mb16{margin-bottom:16px}.mb20{margin-bottom:20px}.mb24{margin-bottom:24px}
.fw6{font-weight:600}.fw7{font-weight:700}
.fs12{font-size:12px}.fs13{font-size:13px}
.text-muted{color:var(--muted)}
.divider{height:1px;background:var(--border);margin:20px 0}

@media(max-width:900px){.g3{grid-template-columns:1fr 1fr}.g4{grid-template-columns:1fr 1fr}.auth-page{grid-template-columns:1fr}.auth-brand{display:none}}
@media(max-width:640px){.sb{display:none}.main{margin-left:0}.page{padding:20px}.g2,.g3,.g4{grid-template-columns:1fr}}
.ai-fab{position:fixed;bottom:24px;right:24px;width:54px;height:54px;border-radius:50%;background:var(--navy);color:#fff;border:none;font-size:22px;cursor:pointer;box-shadow:0 4px 20px rgba(27,58,107,.4);z-index:900;display:flex;align-items:center;justify-content:center;transition:transform .2s,box-shadow .2s}
.ai-fab:hover{transform:scale(1.08);box-shadow:0 6px 24px rgba(27,58,107,.5)}
.ai-panel{position:fixed;bottom:90px;right:24px;width:340px;height:500px;background:#fff;border-radius:18px;box-shadow:0 8px 40px rgba(0,0,0,.18);z-index:900;display:flex;flex-direction:column;overflow:hidden;animation:slideUp .2s ease}
@keyframes slideUp{from{opacity:0;transform:translateY(16px)}to{opacity:1;transform:translateY(0)}}
.ai-hdr{background:var(--navy);color:#fff;padding:14px 16px;display:flex;align-items:center;gap:10px;flex-shrink:0}

  const register=(data)=>{
    const acc=st.get('juntos_accounts',{});
    if(acc[data.email])return 'Email already registered';
    const u={id:`u${Date.now()}`,...data,streak:0,lastCheckIn:null,joinedAt:Date.now(),groupIds:[],topicIds:[],totalCheckIns:0};
    acc[data.email]=u;st.set('juntos_accounts',acc);
    setUser(u);st.set('juntos_user',u);
    setUsers(p=>[...p,{id:u.id,username:u.username,avatar:u.avatar,streak:u.streak}]);
    return null;
  };

  const logout=()=>{
    if(user){const acc=st.get('juntos_accounts',{});if(acc[user.email]){acc[user.email]=user;st.set('juntos_accounts',acc)}}
    setUser(null);localStorage.removeItem('juntos_user');setPage('dashboard');
  };

  const joinGroup=(gid)=>{
    setGroups(p=>p.map(g=>g.id===gid&&!g.members.find(m=>m.userId===user.id)?{...g,members:[...g.members,{userId:user.id,role:'member',streak:user.streak}]}:g));
    upUser({groupIds:[...(user.groupIds||[]),gid]});notify('Joined group!');
  };

  const leaveGroup=(gid)=>{
    setGroups(p=>p.map(g=>g.id===gid?{...g,members:g.members.filter(m=>m.userId!==user.id)}:g));
    upUser({groupIds:(user.groupIds||[]).filter(id=>id!==gid)});setPage('groups');
  };

  const createGroup=(data)=>{
    const topic=TOPICS.find(t=>t.id===data.topicId);
    const g={id:`g${Date.now()}`,...data,topicName:topic?.name||'',topicIcon:topic?.icon||'📚',
      members:[{userId:user.id,role:'admin',streak:user.streak}],createdBy:user.id,messages:[],checkIns:[]};
    setGroups(p=>[...p,g]);
    upUser({groupIds:[...(user.groupIds||[]),g.id]});
    notify('Group created!');return g;
  };

  const sendMessage=(gid,text)=>{
    const msg={id:`m${Date.now()}`,userId:user.id,text,timestamp:Date.now(),reactions:{}};
    setGroups(p=>p.map(g=>g.id===gid?{...g,messages:[...g.messages,msg]}:g));
  };

  const addReaction=(gid,mid,emoji)=>{
    setGroups(p=>p.map(g=>{
      if(g.id!==gid)return g;
      return{...g,messages:g.messages.map(m=>{
        if(m.id!==mid)return m;
        const rxns=m.reactions||{};
        const list=rxns[emoji]||[];
        const has=list.includes(user.id);
        return{...m,reactions:{...rxns,[emoji]:has?list.filter(id=>id!==user.id):[...list,user.id]}};
      })};
    }));
  };

  const checkIn=(gid,notes='',mins=30,isPomodoro=false)=>{
    if(hasCheckedIn(gid))return;
    const today=new Date().toDateString();
    const yesterday=new Date(Date.now()-86400000).toDateString();
    const last=user.lastCheckIn;
    const ns=(!last||last===yesterday)?user.streak+1:last===today?user.streak:1;
    const ci={id:`ci${Date.now()}`,userId:user.id,groupId:gid,date:today,notes,minutesStudied:mins};

    const newMsgs=[];
    newMsgs.push({id:`m${Date.now()}`,userId:user.id,text:`✅ Checked in${notes?` — ${notes}`:''}! (${mins} min${isPomodoro?' 🍅':''})`,timestamp:Date.now(),reactions:{},isCheckIn:true});
    if(MILESTONES.includes(ns)){
      newMsgs.push({id:`m${Date.now()+1}`,userId:'system',text:`🎉 ${user.username} just hit a ${ns}-day streak! The whole group is proud of you! 🔥`,timestamp:Date.now()+1,reactions:{},isCelebration:true});
    }

    setGroups(p=>p.map(g=>{
      if(g.id!==gid)return g;
      const newCIs=[...(g.checkIns||[]),ci];
      const allIn=g.members.every(m=>newCIs.some(c=>c.userId===m.userId&&c.date===today));
      const gs=allIn&&g.groupStreakDate!==today?(g.groupStreak||0)+1:(g.groupStreak||0);
      const gsd=allIn?today:(g.groupStreakDate||null);
      const extra=[];
      if(allIn&&g.groupStreakDate!==today){
        extra.push({id:`m${Date.now()+2}`,userId:'system',text:`🏆 Everyone checked in today! Group streak is now ${gs} days! Keep it going together! 🎊`,timestamp:Date.now()+2,reactions:{},isCelebration:true});
      }
      return{...g,checkIns:newCIs,messages:[...g.messages,...newMsgs,...extra],groupStreak:gs,groupStreakDate:gsd};
    }));
    upUser({streak:ns,lastCheckIn:today,totalCheckIns:(user.totalCheckIns||0)+1,pomodoroCount:(user.pomodoroCount||0)+(isPomodoro?1:0)});
    notify(`Streak: ${ns} 🔥`);
  };

  const sendChallenge=(gid,targetId,desc)=>{
    const target=getUser(targetId);
    const msg={id:`m${Date.now()}`,userId:user.id,text:`⚔️ ${user.username} challenges ${target.username}: "${desc}"`,timestamp:Date.now(),reactions:{},isChallenge:true,challengeTarget:targetId,challengeAccepted:false};
    setGroups(p=>p.map(g=>g.id===gid?{...g,messages:[...g.messages,msg]}:g));
    upUser({challengesSent:(user.challengesSent||0)+1});
    notify(`Challenge sent to ${target.username}! ⚔️`,'info');
  };

  const acceptChallenge=(gid,mid)=>{
    setGroups(p=>p.map(g=>{
      if(g.id!==gid)return g;
      return{...g,messages:g.messages.map(m=>m.id===mid?{...m,challengeAccepted:true}:m)};
    }));
    notify('Challenge accepted! 💪');
  };

  const joinTopic=(tid)=>{
    if(!(user.topicIds||[]).includes(tid)){upUser({topicIds:[...(user.topicIds||[]),tid]});notify('Topic added!')}
  };

  const leaveTopic=(tid)=>upUser({topicIds:(user.topicIds||[]).filter(id=>id!==tid)});

  const getUser=(uid)=>{
    if(uid==='system')return{username:'Juntos',avatar:'🤝',streak:0};
    if(uid===user?.id)return user;
    return users.find(u=>u.id===uid)||{username:'User',avatar:'👤',streak:0};
  };

  const myGroups=()=>groups.filter(g=>g.members.some(m=>m.userId===user?.id));

  const hasCheckedIn=(gid)=>{
    const g=groups.find(x=>x.id===gid);
    if(!g||!user)return false;
    return(g.checkIns||[]).some(ci=>ci.userId===user.id&&ci.date===new Date().toDateString());
  };

  const nav=(p,extra={})=>{setPage(p);if(extra.gid!==undefined)setSelGroup(extra.gid)};

  return <Ctx.Provider value={{user,groups,users,page,selGroup,notif,nav,login,register,logout,upUser,joinGroup,leaveGroup,createGroup,sendMessage,addReaction,checkIn,sendChallenge,acceptChallenge,joinTopic,leaveTopic,getUser,myGroups,hasCheckedIn}}>
    {children}
  </Ctx.Provider>;
}
const useApp=()=>useContext(Ctx);

// ─── Utils ─────────────────────────────────────
function timeAgo(ts){
  const d=Date.now()-ts,m=Math.floor(d/60000);
  if(m<1)return'just now';if(m<60)return`${m}m ago`;
  const h=Math.floor(m/60);if(h<24)return`${h}h ago`;
  return`${Math.floor(h/24)}d ago`;
}

// ─── Pomodoro Timer ────────────────────────────
function PomodoroTimer({onComplete}){
  const [left,setLeft]=useState(25*60);
  const [running,setRunning]=useState(false);
  const [done,setDone]=useState(false);
  const iRef=useRef(null);

  useEffect(()=>{
    if(running&&!done){
      iRef.current=setInterval(()=>{
        setLeft(t=>{
          if(t<=1){clearInterval(iRef.current);setRunning(false);setDone(true);onComplete();return 0;}
          return t-1;
        });
      },1000);
    }
    return()=>clearInterval(iRef.current);
  },[running]);

  const mm=String(Math.floor(left/60)).padStart(2,'0');
  const ss=String(left%60).padStart(2,'0');

  return <div className="pom-wrap">
    {done
      ?<div><div className="pom-done">🎉 25 min complete!</div><div style={{fontSize:13,color:'var(--muted)'}}>Your session is logged automatically.</div></div>
      :<><div className="pom-time">{mm}:{ss}</div>
        <div style={{marginTop:12,display:'flex',gap:8,justifyContent:'center'}}>
          <button className="btn btn-sm btn-p" onClick={()=>setRunning(r=>!r)}>{running?'⏸ Pause':(left<25*60?'▶ Resume':'▶ Start Focus')}</button>
          {left<25*60&&!running&&<button className="btn btn-sm btn-out" onClick={()=>{setLeft(25*60);setRunning(false)}}>↺ Reset</button>}
        </div>
      </>
    }
  </div>;
}

          </div>
        </div>:<div className="fg"><PomodoroTimer onComplete={handlePomoDone}/></div>}

        <div className="fg">
          <label className="fl">What did you learn? <span style={{fontWeight:400,color:'var(--light)'}}>(optional)</span></label>
          <textarea className="fi" rows={3} placeholder="e.g. Covered closures and scope..." value={notes} onChange={e=>setNotes(e.target.value)}/>

          disabled={mode==='pomodoro'&&!pomoDone}
          onClick={submit}>
          {mode==='pomodoro'&&!pomoDone?'⏳ Finish the timer first…':'🔥 Check In & Keep Streak'}
        </button>
      </div>
    </div>
  </div>;
}

function Topics(){
  const {user,joinTopic,leaveTopic,nav,groups}=useApp();
  const [cat,setCat]=useState('All');
  const [q,setQ]=useState('');
  const mine=user?.topicIds||[];
  const getGC=tid=>groups.filter(g=>g.topicId===tid).length;

  const filtered=TOPICS.filter(t=>{
    const mc=cat==='All'||t.cat===cat;
    const mq=!q||t.name.toLowerCase().includes(q.toLowerCase())||t.desc.toLowerCase().includes(q.toLowerCase());
    return mc&&mq;
  });

  const byCat=CATS.slice(1).reduce((a,c)=>{const l=filtered.filter(t=>t.cat===c);if(l.length)a[c]=l;return a},{});

  return <div className="page">
    <div className="ph"><div className="pt">Topics</div><div className="ps">Choose what you want to learn</div></div>
    <div className="sb-w"><span className="sb-ic">🔍</span><input className="fi" placeholder="Search topics..." value={q} onChange={e=>setQ(e.target.value)}/></div>
    <div className="cats">{CATS.map(c=><button key={c} className={`cat${cat===c?' active':''}`} onClick={()=>setCat(c)}>{c}</button>)}</div>

    {cat==='All'?Object.entries(byCat).map(([c,list])=>(
      <div key={c} className="mb24">
        <div className="sec-t">{c}</div>
        <div className="g3">{list.map(t=><TopicCard key={t.id} t={t} joined={mine.includes(t.id)} gc={getGC(t.id)} onJoin={()=>joinTopic(t.id)} onLeave={()=>leaveTopic(t.id)}/>)}</div>
      </div>
    )):(
      <div className="g3">{filtered.map(t=><TopicCard key={t.id} t={t} joined={mine.includes(t.id)} gc={getGC(t.id)} onJoin={()=>joinTopic(t.id)} onLeave={()=>leaveTopic(t.id)}/>)}</div>
    )}

    {filtered.length===0&&<div className="empty"><div className="empty-ic">🔍</div><div className="empty-t">No topics found</div><div>Try a different search or category</div></div>}
  </div>;
}

function TopicCard({t,joined,gc,onJoin,onLeave}){

// ─── Leaderboard ───────────────────────────────
function Leaderboard({g,user,getUser,sendChallenge}){
  const [challTarget,setChallTarget]=useState(null);
  const [challText,setChallText]=useState('');
  const weekAgo=new Date(Date.now()-7*86400000);
  const ranked=[...g.members].map(m=>{
    const u=getUser(m.userId);
    const wCI=(g.checkIns||[]).filter(ci=>ci.userId===m.userId&&new Date(ci.date)>=weekAgo).length;
    return{...m,u,wCI};
  }).sort((a,b)=>(b.streak||0)-(a.streak||0));
  const medals=['🥇','🥈','🥉'];

  return <div style={{display:'flex',flexDirection:'column',gap:6}}>
    {ranked.map((m,i)=>(
      <div key={m.userId}>
        <div className="lb-row">
          <div className="lb-pos">{medals[i]||<span style={{fontSize:13,fontWeight:700,color:'var(--muted)'}}>{i+1}</span>}</div>
          <div className="av av-md">{m.u.avatar}</div>
          <div style={{flex:1}}>
            <div style={{fontWeight:600,fontSize:14}}>{m.u.username}{m.userId===user.id&&<span style={{fontSize:11,color:'var(--muted)',marginLeft:6}}>you</span>}</div>
            <div style={{fontSize:12,color:'var(--muted)'}}>🔥 {m.streak||0} streak &nbsp;·&nbsp; ✅ {m.wCI} this week</div>
          </div>
          {m.userId!==user.id&&<button className="btn btn-sm btn-out" title="Challenge" onClick={()=>setChallTarget(challTarget===m.userId?null:m.userId)}>⚔️</button>}
        </div>
        {challTarget===m.userId&&<div className="ch-form">
          <input className="fi" style={{flex:1,fontSize:13,padding:'6px 10px'}}
            placeholder={`Challenge ${m.u.username}… e.g. "Check in 5 days this week!"`}
            value={challText} onChange={e=>setChallText(e.target.value)}
            onKeyDown={e=>{if(e.key==='Enter'&&challText.trim()){sendChallenge(g.id,m.userId,challText.trim());setChallTarget(null);setChallText('');}}}
            autoFocus
          />
          <button className="btn btn-o btn-sm" onClick={()=>{if(challText.trim()){sendChallenge(g.id,m.userId,challText.trim());setChallTarget(null);setChallText('');}}}>Send ⚔️</button>
          <button className="btn btn-g btn-sm" onClick={()=>setChallTarget(null)}>✕</button>
        </div>}
      </div>
    ))}
  </div>;
}

// ─── Luna AI ───────────────────────────────────
function getLunaResponse(q){
  const lq=q.toLowerCase();

  // greetings
  if(/^(hi|hello|hey|bonjour|hola|salut|buenas|bonsoir)\b/.test(lq)){
    const r=['Bonjour / Hola! 👋 Ready to learn? Ask me anything about French, Spanish, or how Juntos works!',
             'Hey! ¡Qué bueno verte! What language question can I help you with today?',
             'Hello! Whether it\'s grammar, vocabulary, pronunciation, or motivation — I\'m here 🌙'];
    return r[~~(Math.random()*r.length)];
  }

  // translate → French
  if(/(how.*say|translate|what.*french|en français|comment.*dire).*french|(french).*(say|translate|mean|word)/.test(lq)){
    const map={'thank you':'**Merci** · **Merci beaucoup** (thank you very much)','hello':'**Bonjour** (formal) · **Salut** (casual) · **Bonsoir** (evening)','goodbye':'**Au revoir** · **Salut** (casual) · **À bientôt** (see you soon)','please':'**S\'il vous plaît** (formal) · **S\'il te plaît** (casual)','sorry':'**Pardon** · **Désolé(e)** · **Excusez-moi**','i love you':'**Je t\'aime** 💕 — one of the most beautiful phrases in any language!','where is':'**Où est…?** → "Où est la gare?" (Where\'s the station?)','how much':'**Combien ça coûte?** or **C\'est combien?**','i don\'t understand':'**Je ne comprends pas** — you\'ll use this a lot at first 😄','yes':'**Oui** (formal) · **Ouais** (casual, like "yeah")','no':'**Non** · **Pas du tout** (not at all)'};
    for(const[k,v]of Object.entries(map))if(lq.includes(k))return `"${k}" in French:\n${v}`;
    return 'I can translate! Try something like:\n"How do you say \'thank you\' in French?"\nor "How do you say \'sorry\' in Spanish?" 🎯';
  }

  // translate → Spanish
  if(/(how.*say|translate|what.*spanish|en español|cómo.*dice).*spanish|(spanish).*(say|translate|mean|word)/.test(lq)){
    const map={'thank you':'**Gracias** · **Muchísimas gracias** (many thanks)','hello':'**Hola** (anytime) · **Buenos días** (morning) · **Buenas tardes** (afternoon)','goodbye':'**Adiós** · **Hasta luego** (see you later) · **Chao** (very casual)','please':'**Por favor** — always polite! 😊','sorry':'**Perdón** · **Lo siento** (I\'m sorry) · **Disculpe** (formal)','i love you':'**Te quiero** (I care for you) · **Te amo** (deep love) 💕','where is':'**¿Dónde está…?** → "¿Dónde está el baño?" (Where\'s the bathroom?)','how much':'**¿Cuánto cuesta?** — useful in every shop!','i don\'t understand':'**No entiendo** · **No comprendo**','yes':'**Sí** · **Claro** (of course) · **Por supuesto** (certainly)','no':'**No** · **Para nada** (not at all) · **Qué va** (no way)'};
    for(const[k,v]of Object.entries(map))if(lq.includes(k))return `"${k}" in Spanish:\n${v}`;
    return '¡Claro! Try something like:\n"How do you say \'excuse me\' in Spanish?"\nor "Translate \'thank you\' to French" 🎯';
  }

  // French grammar
  if(/french.*(grammar|article|gender|tense|verb|conjugat|past|future)|article.*(le|la|les)|(le |la |les |un |une).*(mean|use|when)/.test(lq)){
    if(/article|le |la |les |un |une/.test(lq))return 'French Articles 📚\n\n**Definite** (the):\n• le — masculine: le livre (the book)\n• la — feminine: la porte (the door)\n• les — plural: les enfants (the children)\n\n**Indefinite** (a/an):\n• un — masc: un café\n• une — fem: une baguette\n\n💡 Tip: learn the article WITH every new noun — "le chat" not just "chat"!';
    if(/subjonctif|subjunctive/.test(lq))return 'French Subjunctive (Subjonctif) 🧠\n\nUsed after doubt, emotion, necessity:\n• **Il faut que** tu viennes → You need to come\n• **Je veux que** tu sois là → I want you to be there\n• **Bien que** ce soit dur → Although it\'s hard\n\n💡 Key triggers: vouloir que, falloir que, bien que, pour que, avant que';
    if(/passé|composé|past tense/.test(lq))return 'Passé Composé (French past) ⏪\n\nFormula: **avoir/être + past participle**\n\nWith AVOIR: J\'ai mangé (I ate) · Tu as parlé (You spoke)\nWith ÊTRE (motion verbs): Je suis allé(e) · Elle est venue\n\n💡 DR MRS VANDERTRAMP verbs use être!\n(Descendre, Retourner, Monter, Rester, Sortir…)';
    return 'French Grammar Help 📖\n\nI can explain:\n• Articles (le, la, les, un, une)\n• Passé composé (past tense)\n• Subjonctif\n• Adjective placement (AFTER the noun!)\n• Verb conjugations\n\nWhat specifically would you like to know?';
  }

  // Spanish grammar
  if(/spanish.*(grammar|article|tense|verb|conjugat|past|future)|(ser|estar).*(mean|use|differ)/.test(lq)){
    if(/ser.*estar|estar.*ser|differ.*ser|ser.*differ/.test(lq))return 'Ser vs Estar ⚡ — the classic!\n\n**SER** (identity/permanent):\n• Origin: Soy de Barcelona\n• Profession: Eres médico\n• Description: Es inteligente\n• Time: Son las tres\n\n**ESTAR** (state/temporary/location):\n• Location: Estoy en casa\n• Emotion: Estás feliz hoy\n• Condition: La sopa está fría\n\n💡 "¿Cómo ESTÁS?" uses estar — your state can change!';
    if(/subjuntivo|subjunctive/.test(lq))return 'Spanish Subjunctive 🧠\n\nUsed for wishes, doubts, hypotheticals:\n• **Quiero que** vengas → I want you to come\n• **Es posible que** llueva → It might rain\n• **Ojalá** tengas suerte → I hope you\'re lucky\n\n💡 Triggers: querer que, esperar que, ojalá, aunque, para que, antes de que';
    if(/preterite|pretérito|past tense/.test(lq))return 'Spanish Preterite (past) ⏪\n\n-AR: hablé, hablaste, habló, hablamos, hablaron\n-ER/-IR: comí, comiste, comió, comimos, comieron\n\nKey irregulars:\n• ser/ir → fui, fuiste, fue, fuimos, fueron\n• tener → tuve, tuviste, tuvo\n• estar → estuve, estuviste, estuvo\n\n💡 Use for completed actions with a clear endpoint!';
    return 'Spanish Grammar Help 📖\n\nI can explain:\n• Ser vs Estar (to be × 2!)\n• Preterite vs Imperfect (two past tenses)\n• Subjunctive mood\n• Verb conjugations\n• Gender & articles\n\nWhat are you struggling with?';
  }

  // Pronunciation
  if(/pronoun|pronounce|sound like|accent|how.*say/.test(lq)){
    if(/french.*r\b|r.*french|r.*gargl/.test(lq))return 'French "R" 🎵\n\nProduced at the **back of the throat** — like gargling gently.\n\n1. Open mouth slightly\n2. Tongue rests at the bottom\n3. Vibrate the back of your throat\n4. Practice: rouge, rue, merci, bonjour\n\n🐸 Sara\'s challenge: say "grenouille" (frog) every morning until it clicks!';
    if(/spanish.*r|roll.*r|rr/.test(lq))return 'Spanish Rolled "R" 🌀\n\nThe tongue TIP taps/rolls against the roof of your mouth:\n\n1. Say English "butter" fast — that flap is close!\n2. For RR: make a motor sound "trrrrr"\n3. Practice: perro, carro, tierra, arroz\n\n💡 Marco\'s tip: "pe-RR-o" slowly, then speed up!';
    if(/nasal|french.*an|french.*on|french.*in/.test(lq))return 'French Nasals 👃\n\n• **an/en** → "ahn" (enfant, chanter)\n• **on** → "ohn" (bonjour, maison)\n• **in/ain** → front-nasal "an" (vin, main)\n\nAir flows through your NOSE as well as mouth!\n\n💡 Practice sentence: "Un bon vin blanc" — 4 nasals in a row! 😄';
    return 'Pronunciation Tips 🎵\n\nFrench challenges 🇫🇷:\n• R — throat gargle\n• Nasal vowels (an, on, in)\n• Silent final consonants\n• Liaison (connecting words)\n\nSpanish challenges 🇪🇸:\n• Rolled R (rr)\n• Soft J (breathy H)\n• Pure vowels — always clear, never lazy\n\nWhich sound do you want to work on?';
  }

  // Vocabulary topics
  if(/food|eat|restaurant|drink|menu|coffee|bread|baguette|tapas/.test(lq)){
    if(/french/.test(lq))return 'French Food Vocab 🥐\n\nla baguette · le croissant · le fromage (cheese)\nle vin (wine) · l\'eau (water) · le café\nle menu · l\'addition (the bill)\n\n🍽️ Essential: "L\'addition, s\'il vous plaît!" — The bill, please!';
    return 'Spanish Food Vocab 🥘\n\nel desayuno / almuerzo / cena (breakfast/lunch/dinner)\nel café con leche · el agua · la cuenta (bill)\n¿Qué recomienda? (What do you recommend?)\n\n🍽️ Essential: "¿Me trae la cuenta, por favor?" — Can you bring the bill?';
  }

  if(/number|count|uno|deux|trois/.test(lq))return 'Numbers 1–10 🔢\n\n#  | French  | Spanish\n---|---------|--------\n1  | un/une  | uno/una\n2  | deux    | dos\n3  | trois   | tres\n4  | quatre  | cuatro\n5  | cinq    | cinco\n6  | six     | seis\n7  | sept    | siete\n8  | huit    | ocho\n9  | neuf    | nueve\n10 | dix     | diez\n\n💡 French: "cinq" and "six" are often silent before a consonant!';

  if(/color|colour|couleur|color/.test(lq))return 'Colors 🎨\n\nColor    | French        | Spanish\n---------|---------------|--------\nRed      | rouge         | rojo/a\nBlue     | bleu          | azul\nGreen    | vert/verte    | verde\nYellow   | jaune         | amarillo/a\nBlack    | noir/noire    | negro/a\nWhite    | blanc/blanche | blanco/a\nOrange   | orange        | naranja\n\n💡 Remember: adjectives come AFTER the noun in both languages!';

  if(/greet|introduce|introduction|present.*self|myself/.test(lq))return 'Self-Introduction Template 👋\n\n🇫🇷 French:\n"Bonjour! Je m\'appelle [name]. Je suis de [city]. J\'apprends l\'espagnol parce que j\'adore la culture! Enchanté(e)!"\n\n🇪🇸 Spanish:\n"¡Hola! Me llamo [name]. Soy de [city]. Aprendo francés porque me encanta el idioma. ¡Mucho gusto!"';

  // Motivation / struggling
  if(/motivat|give up|hard|difficult|struggl|can\'t|cant|tired|lost streak|missed|discourag/.test(lq)){
    const r=['¡Ánimo! 💪 Every language master was once a beginner. Missing one day doesn\'t erase your progress — what matters is tomorrow.\n\n📊 Research: it takes ~66 days to build a habit. You\'re building something real!',
             'Language learning is a marathon, not a sprint 🌟\n\nOn tough days, even 5 minutes of listening to music in your target language keeps the habit alive.\n\nLa constance > la perfection. Consistency beats perfection!',
             '"A river cuts through rock not by force, but by persistence." 💧\n\nYour brain is literally building new neural pathways every time you practice. Each day matters. ¡No te rindas!'];
    return r[~~(Math.random()*r.length)];
  }

  // Practice exercise
  if(/exercise|practice|quiz|test|challenge|drill|give me/.test(lq)){
    const r=['Mini Exercise: Colors! 🎨\n\nTranslate to your target language:\n1. The red car\n2. A blue sky\n3. Green leaves\n\n🇫🇷: 1. La voiture rouge 2. Un ciel bleu 3. Des feuilles vertes\n🇪🇸: 1. El coche rojo 2. Un cielo azul 3. Hojas verdes',
             'Mini Exercise: Café order ☕\n\n🇫🇷: "Bonjour! Un café s\'il vous plaît."\nWaiter: "Avec du lait?" → You: "Oui, avec du lait, merci!"\n\n🇪🇸: "¡Hola! Un café con leche, por favor."\nWaiter: "¿Para aquí o para llevar?" → You: "Para aquí, gracias."',
             'Fill in the blank! 📝\n\n🇫🇷: "Je ___ (to be) très content(e)." → suis\n"Elle ___ (to go) au marché." → va\n\n🇪🇸: "___ (I am) de Lyon." → Soy\n"¿Cómo ___ (you are/feel) hoy?" → estás'];
    return r[~~(Math.random()*r.length)];
  }

  // App features
  if(/pomodoro/.test(lq))return 'Pomodoro Timer 🍅\n\n25 minutes of focused study → short break.\n\nIn Juntos: pick Pomodoro mode when checking in. The timer runs for 25 min — your check-in only submits when it completes. You earn a 🍅 tag on your message!\n\n💡 25-min focused sessions beat 2 hours of distracted studying.';
  if(/streak/.test(lq))return 'Streaks 🔥\n\n**Personal streak**: check in daily → grows. Miss a day → resets. Longer streaks unlock badges!\n\n**Group streak**: when EVERY member checks in the same day → group streak grows 🏆\n\n💡 Tip: check in early in the day so you don\'t forget!';
  if(/react|emoji/.test(lq))return 'Emoji Reactions 🔥💡🎉👏❤️\n\nTap any emoji on a group message to react. Use them to:\n• Encourage a teammate\'s check-in 🔥\n• Highlight a useful tip 💡\n• Celebrate progress 🎉\n• Show appreciation ❤️';
  if(/challenge/.test(lq))return 'Challenges ⚔️\n\nIn the Leaderboard tab inside a group:\n1. Click ⚔️ next to a member\'s name\n2. Type your challenge (e.g. "Check in 5 days this week!")\n3. They see it in chat and can accept it 💪\n\nFriendly competition = faster progress!';
  if(/leaderboard|ranking/.test(lq))return 'Leaderboard 🏆\n\nInside any group, tap the **Leaderboard** tab.\nMembers are ranked by:\n• 🥇 Personal streak length\n• ✅ Check-ins this week\n\nUse it to challenge others with ⚔️ and stay accountable!';
  if(/check.?in/.test(lq))return 'Daily Check-in ✅\n\nOpen a group → tap "Check In for Today".\nChoose:\n• **Manual** — pick your study time, add notes\n• **Pomodoro** — 25-min timer, auto-submits when done 🍅\n\nCheck-ins grow your personal streak AND contribute to the Group Streak when everyone checks in the same day!';

  // Default
  const d=['I\'m Luna, your Juntos language coach! 🌙\n\nI can help with:\n• Translations 🌍 — "How do you say X in French?"\n• Grammar 📖 — articles, ser/estar, subjunctive…\n• Pronunciation 🎵 — the French R, the Spanish RR…\n• Vocabulary 📚 — food, numbers, colors, greetings\n• Practice ✏️ — "Give me an exercise"\n• Motivation 💪 — when learning feels hard\n• App tips ℹ️ — streaks, Pomodoro, challenges\n\nWhat would you like to explore?',
           'Not sure I caught that 😊\n\nTry asking:\n• "How do you say goodbye in French?"\n• "What\'s the difference between ser and estar?"\n• "Give me a practice exercise"\n• "How does the Pomodoro timer work?"\n• "I\'m struggling, motivate me"\n\n¡Juntos aprendemos! 🌟'];
  return d[~~(Math.random()*d.length)];
}

const LUNA_CHIPS=['🇫🇷 French article','🇪🇸 Ser vs Estar','🔢 Numbers 1-10','🎨 Colors','💪 Motivate me','✏️ Give me exercise'];

function AIAssistant(){
  const [open,setOpen]=useState(false);
  const [msgs,setMsgs]=useState([{r:'bot',t:'Bonjour / Hola! 👋 I\'m Luna, your Juntos language coach.\n\nAsk me about French & Spanish grammar, vocabulary, pronunciation, or just say "motivate me" when you need a boost! 🌙'}]);
  const [inp,setInp]=useState('');
  const [typing,setTyping]=useState(false);
  const endRef=useRef(null);

  useEffect(()=>{endRef.current?.scrollIntoView({behavior:'smooth'})},[msgs,typing,open]);

  const send=(text)=>{
    const q=(text||inp).trim();
    if(!q)return;
    setMsgs(m=>[...m,{r:'usr',t:q}]);
    setInp('');
    setTyping(true);
    setTimeout(()=>{
      setTyping(false);
      setMsgs(m=>[...m,{r:'bot',t:getLunaResponse(q)}]);
    },700+Math.random()*500);
  };

  return <>
    <button className="ai-fab" onClick={()=>setOpen(o=>!o)} title="Ask Luna, your language coach">
      {open?'✕':'🌙'}
    </button>
    {open&&<div className="ai-panel">
      <div className="ai-hdr">
        <div className="ai-avatar">🌙</div>
        <div>
          <div style={{fontWeight:700,fontSize:14}}>Luna</div>
          <div style={{fontSize:11,opacity:.75}}>Juntos Language Coach · always here</div>
        </div>
        <button style={{marginLeft:'auto',background:'none',border:'none',color:'#fff',cursor:'pointer',fontSize:18,opacity:.7}} onClick={()=>setOpen(false)}>✕</button>
      </div>
      <div className="ai-msgs">
        {msgs.map((m,i)=><div key={i} className={m.r==='bot'?'ai-bot':'ai-usr'}>{m.t}</div>)}
        {typing&&<div className="ai-typing"><div className="ai-dot"/><div className="ai-dot"/><div className="ai-dot"/></div>}
        <div ref={endRef}/>
      </div>
      <div className="ai-chips">
        {LUNA_CHIPS.map(c=><button key={c} className="ai-chip" onClick={()=>send(c)}>{c}</button>)}
      </div>
      <div className="ai-input-row">
        <input className="fi" style={{flex:1,fontSize:13}} placeholder="Ask anything…" value={inp} onChange={e=>setInp(e.target.value)} onKeyDown={e=>e.key==='Enter'&&send()}/>
        <button className="btn btn-p btn-sm" onClick={()=>send()} disabled={!inp.trim()}>→</button>
      </div>
    </div>}
  </>;
}

// ─── App ───────────────────────────────────────
function App(){
  const {user,page,selGroup,notif}=useApp();
  if(!user)return <AuthPage/>;

  const pages={dashboard:<Dashboard/>,topics:<Topics/>,groups:<Groups/>,'group-detail':<GroupDetail gid={selGroup}/>,profile:<Profile/>};

  return <>
    <div className="layout">
      <Sidebar/>
      <main className="main">{pages[page]||<Dashboard/>}</main>
    </div>
    {notif&&<div className="notif" style={{background:notif.type==='success'?'#22C55E':notif.type==='error'?'#EF4444':'#3B82F6'}}>{notif.msg}</div>}
    <AIAssistant/>
  </>;
}

ReactDOM.createRoot(document.getElementById('root')).render(
  <AppProvider><App/></AppProvider>
);
</script>
</body>
</html>
